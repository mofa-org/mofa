name: Clippy Autofix

on:
  schedule:
    - cron: '0 6 * * 2' # Every Tuesday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  clippy-autofix:
    name: Run Autofix and Create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-autofix-${{ hashFiles('**/Cargo.lock') }}

      - name: Dry-run clippy to capture warnings
        id: dry_run
        run: |
          {
            echo 'WARNINGS<<EOF'
            # Using --message-format=short for concise easily parsable output
            cargo clippy --workspace --all-features --message-format=short 2>&1 | grep "warning: " | sort -u || echo "No warnings found"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Auto-fix clippy and fmt
        run: |
          cargo clippy --fix --workspace --all-features --allow-dirty
          cargo fmt --all

      - name: Get current date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ci): auto-fix clippy and fmt warnings"
          title: "chore: apply clippy and fmt auto-fixes"
          branch: "chore/clippy-autofix-${{ env.DATE }}"
          delete-branch: true
          labels: |
            ci
            lint
          body: |
            This PR was auto-generated by the `clippy-autofix` weekly workflow.
            
            It applies auto-fixable `cargo clippy` and `cargo fmt` changes.

            <details>
            <summary>Warnings captured before fix</summary>

            ```text
            ${{ steps.dry_run.outputs.WARNINGS }}
            ```
            
            </details>
